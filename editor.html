<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Editor</title>
  <link rel="stylesheet" href="css/main.css">

</head>
<body>
  <div id="toolbar">
    <div id="toolbar-left">
      <button id="btn-open" title="Open file (Ctrl+O)">Open</button>
      <button id="btn-save" title="Save file (Ctrl+S)" disabled>Save</button>
      <button id="btn-save-as" title="Save as… (Ctrl+Shift+S)">Save As</button>
      <span id="file-name"></span>
      <span id="dirty-indicator" title="Unsaved changes"></span>
    </div>
    <div id="toolbar-right">
      <button id="btn-collapse-all" title="Collapse all tree nodes">Collapse All</button>
      <button id="btn-expand-all" title="Expand all tree nodes">Expand All</button>
      <button id="btn-format" title="Format JSON">Format</button>
    </div>
  </div>

  <div id="main">
    <div id="tree-pane">
      <div id="tree-container"></div>
      <div id="tree-error"></div>
    </div>
    <div id="splitter"></div>
    <div id="editor-pane">
      <div id="editor-container"></div>
    </div>
  </div>

  <script type="module" src="js/editor.js"></script>
</body>
</html>
